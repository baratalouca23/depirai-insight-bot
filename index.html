<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preload Critical Resources -->
    <link rel="preload" href="/src/index.css" as="style" />
    
    <!-- DNS Prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- SEO Meta Tags -->
    <title>Depirai | Desenvolvimento Web Fullstack - Experiências Digitais e Sistemas Inteligentes</title>
    <meta
      name="description"
      content="Criamos experiências digitais e sistemas inteligentes. Desenvolvimento Web Fullstack focado em performance e usabilidade. Transformamos suas ideias em soluções digitais."
    />
    <meta
      name="keywords"
      content="desenvolvimento web, fullstack, react, sistemas inteligentes, performance, usabilidade, UX, design, aplicações web"
    />
    <meta name="author" content="Depirai" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Depirai - Desenvolvimento Web Fullstack" />
    <meta
      property="og:description"
      content="Criamos experiências digitais e sistemas inteligentes. Desenvolvimento focado em performance."
    />
    <meta property="og:url" content="https://depirai.com" />
    <meta property="og:site_name" content="Depirai" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:image" content="https://depirai.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Depirai - Desenvolvimento Web Fullstack" />
    <meta name="twitter:description" content="Criamos experiências digitais e sistemas inteligentes." />
    <meta name="twitter:image" content="https://depirai.com/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://depirai.com" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico" />
    <meta name="msapplication-TileColor" content="#C1272D" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" media="print" onload="this.media='all'" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#C1272D" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Depirai" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Depirai",
        "description": "Engenharia de Receita & Infraestrutura TI - Consultoria especializada em Linux HA e Power BI",
        "url": "https://depirai.com",
        "logo": "https://depirai.com/logo.png",
        "sameAs": [
          "https://linkedin.com/company/depirai"
        ],
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Pirai do Sul PR ",
          "addressRegion": "PR",
          "addressCountry": "BR"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+55-42-98891-1463",
          "contactType": "sales",
          "availableLanguage": ["Portuguese", "English", "Spanish"]
        }
      }
    </script>

    <!-- Structured Data - LocalBusiness -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Depirai",
        "image": "https://depirai.com/logo.png",
        "priceRange": "$$",
        "telephone": "+55-42-98891-1463",
        "email": "contato@depirai.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Pirai do Sul",
          "addressRegion": "PR",
          "addressCountry": "BR"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": -25.3900,
          "longitude": -51.4600
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "09:00",
          "closes": "18:00"
        },
        "areaServed": {
          "@type": "Country",
          "name": "Brasil"
        },
        "serviceType": ["Consultoria TI", "Linux HA", "Power BI", "DevOps", "Infraestrutura"]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- VLibras - Acessibilidade em Libras (lazy load) -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script>
      // Lazy load VLibras after page load
      window.addEventListener('load', function() {
        setTimeout(function() {
          var script = document.createElement('script');
          script.src = 'https://vlibras.gov.br/app/vlibras-plugin.js';
          script.onload = function() {
            new window.VLibras.Widget('https://vlibras.gov.br/app');
          };
          document.body.appendChild(script);
        }, 3000);
      });
    </script>
  </body>
</html>
